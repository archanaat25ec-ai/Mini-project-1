<!DOCTYPE html>
<html>
<head>
    <title>Accounts</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2 style="text-align:center;">📋 All Accounts</h2>

<table>
<tr>
    <th>Account</th>
    <th>Last Name</th>
    <th>First Name</th>
    <th>Balance</th>
    <th>Actions</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[3]}}</td>
    <td>
        <a href="/edit/{{row[0]}}" style="color:white;">Edit</a> |
        <a href="/delete/{{row[0]}}" style="color:red;">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>
